const enc=new TextEncoder(),dec=new TextDecoder();const $=id=>document.getElementById(id);const prefix=`headlinerSecure:${CONFIG.slug}:`;
function b64bytes(s){const x=atob(s),a=new Uint8Array(x.length);for(let i=0;i<x.length;i++)a[i]=x.charCodeAt(i);return a}
function bytesB64(a){let s='';a=new Uint8Array(a);for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s)}
async function derive(password,salt){const base=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64bytes(salt),iterations:CONFIG.iterations,hash:'SHA-256'},base,{name:'AES-GCM',length:256},true,['encrypt','decrypt'])}
async function decryptWithKey(env,key){const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64bytes(env.iv),additionalData:enc.encode(env.id)},key,b64bytes(env.ciphertext));return dec.decode(plain)}
function clearKeys(){for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.startsWith(prefix))localStorage.removeItem(k)}}
function launch(html){
  document.body.innerHTML='';document.body.style.cssText='margin:0;padding:0;display:block;background:#080b10';
  const frame=document.createElement('iframe');frame.id='appFrame';frame.setAttribute('allow','clipboard-read; clipboard-write');document.body.appendChild(frame);
  const lock=document.createElement('button');lock.id='parentLock';lock.type='button';lock.textContent='🔒 Lock';lock.onclick=()=>{clearKeys();location.reload()};document.body.appendChild(lock);
  frame.srcdoc=html;
  let timer;const reset=()=>{clearTimeout(timer);timer=setTimeout(()=>{clearKeys();location.reload()},30*60*1000)};
  ['pointerdown','keydown','touchstart','mousemove'].forEach(name=>addEventListener(name,reset,{passive:true}));reset();
}
async function tryRemembered(){for(const env of CONFIG.envelopes){try{const raw=localStorage.getItem(prefix+env.id),exp=Number(localStorage.getItem(prefix+env.id+':exp'));if(!raw||Date.now()>exp)continue;const key=await crypto.subtle.importKey('raw',b64bytes(raw),{name:'AES-GCM'},true,['decrypt']);launch(await decryptWithKey(env,key));return true}catch(e){localStorage.removeItem(prefix+env.id);localStorage.removeItem(prefix+env.id+':exp')}}return false}
$('login').addEventListener('submit',async e=>{e.preventDefault();$('msg').textContent='';$('unlock').disabled=true;$('btnText').style.display='none';$('spinner').style.display='block';try{const env=CONFIG.envelopes.find(x=>x.id===$('role').value);const key=await derive($('password').value,env.salt);const app=await decryptWithKey(env,key);if($('remember').checked){const raw=await crypto.subtle.exportKey('raw',key);localStorage.setItem(prefix+env.id,bytesB64(raw));localStorage.setItem(prefix+env.id+':exp',String(Date.now()+30*24*60*60*1000))}launch(app)}catch(err){$('msg').textContent='Incorrect password for the selected role.';$('password').select();$('unlock').disabled=false;$('btnText').style.display='inline';$('spinner').style.display='none'}});
(async()=>{if(!window.crypto?.subtle){$('msg').textContent='Secure access requires HTTPS (GitHub Pages works).';return}await tryRemembered()})();
</script></body></html>
